<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <!-- Neon Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle (Maskable-friendly safe area) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Calendar Grid (Background level) -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="6" fill="none">
    <rect x="96" y="96" width="320" height="320" rx="32" />
    <line x1="96" y1="176" x2="416" y2="176" stroke-opacity="0.15" />
    <line x1="96" y1="256" x2="416" y2="256" />
    <line x1="96" y1="336" x2="416" y2="336" />
    <line x1="176" y1="176" x2="176" y2="416" />
    <line x1="256" y1="176" x2="256" y2="416" />
    <line x1="336" y1="176" x2="336" y2="416" />
  </g>

  <!-- Calendar Binder Rings (glowing top loops) -->
  <g fill="url(#primaryGrad)">
    <rect x="156" y="64" width="40" height="64" rx="20" />
    <rect x="316" y="64" width="40" height="64" rx="20" />
  </g>

  <!-- Glowing Car Steering Wheel/Dashboard Concept or stylized Car -->
  <!-- Let's draw a premium glowing front silhouette of a sports car -->
  <g filter="url(#glow)">
    <!-- Car body base -->
    <path d="M 128 320 
             C 128 290, 160 280, 256 280 
             C 352 280, 384 290, 384 320 
             L 396 350 
             C 396 365, 380 370, 370 370 
             L 142 370 
             C 132 370, 116 365, 116 350 Z" 
          fill="url(#primaryGrad)" />
    
    <!-- Windshield -->
    <path d="M 176 284
             L 216 220 
             C 224 212, 288 212, 296 220 
             L 336 284 
             C 300 280, 212 280, 176 284 Z" 
          fill="#1e293b" opacity="0.85" />
    
    <path d="M 216 224 
             C 224 216, 288 216, 296 224 
             L 326 272 
             L 186 272 Z" 
          fill="url(#accentGrad)" opacity="0.6" />

    <!-- Glowing headlights -->
    <ellipse cx="156" cy="336" rx="24" ry="12" fill="#5eead4" />
    <ellipse cx="356" cy="336" rx="24" ry="12" fill="#5eead4" />
    
    <!-- Grille light strip -->
    <rect x="206" y="332" width="100" height="8" rx="4" fill="#818cf8" />
  </g>
</svg>
